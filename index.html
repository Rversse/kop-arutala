<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Price list harian Koperasi Arutala — cek harga bahan dapur terkini sebelum membuat Purchase Order." />
  <title>Koperasi Arutala Sejahtera Bersama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-text">
        <h1>KOPERASI ARUTALA</h1>
        <p>UPDATE HARIAN</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="tanggal-hari-ini"></span>
      <span id="last-updated">Memuat data…</span>
      <span id="refresh-countdown"></span>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="Cari nama item…" autocomplete="off" />
    </div>
    <label class="toggle-tersedia">
      <input type="checkbox" id="toggle-tersedia" checked />
      Hanya tersedia
    </label>
    <div class="btn-group">
      <button class="btn" onclick="expandAll()">▼ Buka</button>
      <button class="btn" onclick="collapseAll()">▲ Tutup</button>
      <button class="btn" onclick="refreshData()">↻ Refresh</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">Total: <span id="stat-total">—</span></div>
    <div class="stat-chip">Naik: <span id="stat-naik">—</span></div>
    <div class="stat-chip">Turun: <span id="stat-turun">—</span></div>
    <div class="stat-chip">Tidak tersedia: <span id="stat-notavail">—</span></div>
  </div>

  <div class="table-wrap" id="table-area">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Mengambil data dari server…</p>
    </div>
  </div>

  <footer>
    <p>Koperasi Arutala &copy; 2026 &mdash; Data diperbarui setiap pagi pukul 06:00 WIB</p>
  </footer>

  <button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Ke atas">▲</button>

  <script src="script.js?v=3" defer></script>
</body>
</html>
