<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koperasi Arutala — Price List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark  : #1a2e1a;
      --green-mid   : #2d5a27;
      --green-light : #4a8c3f;
      --green-pale  : #e8f5e2;
      --green-border: #c5ddb8;
      --accent      : #f0a500;
      --red-pale    : #fdecea;
      --red-text    : #c0392b;
      --text-main   : #1a2e1a;
      --text-muted  : #6b8c6b;
      --white       : #ffffff;
      --bg          : #f4f8f1;
      --card-bg     : #ffffff;
      --mono : 'Roboto Mono', monospace;
      --sans : 'Roboto Mono', monospace;
      --radius      : 12px;
      --shadow      : 0 2px 16px rgba(45,90,39,0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family   : var(--sans);
      background    : var(--bg);
      color         : var(--text-main);
      min-height    : 100vh;
      padding-bottom: 60px;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    header {
      background   : var(--green-dark);
      color        : var(--white);
      padding      : 28px 24px 24px;
      position     : sticky;
      top          : 0;
      z-index      : 100;
      box-shadow   : 0 2px 20px rgba(0,0,0,0.25);
    }

    .header-inner {
      max-width      : 900px;
      margin         : 0 auto;
      display        : flex;
      flex-wrap      : wrap;
      gap            : 16px;
      align-items    : center;
      justify-content: space-between;
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .brand-icon {
      width           : 44px;
      height          : 44px;
      background      : var(--green-light);
      border-radius   : 10px;
      display         : flex;
      align-items     : center;
      justify-content : center;
      font-size       : 22px;
    }

    .brand-text h1 {
      font-size  : 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-text p {
      font-size : 0.72rem;
      opacity   : 0.6;
      font-family: var(--mono);
      margin-top: 2px;
    }

    #last-updated {
      font-size  : 0.7rem;
      font-family: var(--mono);
      opacity    : 0.55;
    }

    /* ── CONTROLS ──────────────────────────────────────────── */
    .controls {
      max-width : 900px;
      margin    : 24px auto 0;
      padding   : 0 16px;
      display   : flex;
      gap       : 12px;
      flex-wrap : wrap;
      align-items: center;
    }

    .search-wrap {
      flex       : 1;
      min-width  : 200px;
      position   : relative;
    }

    .search-wrap svg {
      position  : absolute;
      left      : 14px;
      top       : 50%;
      transform : translateY(-50%);
      color     : var(--text-muted);
      pointer-events: none;
    }

    #search {
      width        : 100%;
      padding      : 10px 14px 10px 40px;
      border       : 1.5px solid var(--green-border);
      border-radius: var(--radius);
      font-family  : var(--sans);
      font-size    : 0.9rem;
      background   : var(--card-bg);
      color        : var(--text-main);
      outline      : none;
      transition   : border-color 0.2s;
    }

    #search:focus { border-color: var(--green-light); }

    #filter-kat {
      padding      : 10px 14px;
      border       : 1.5px solid var(--green-border);
      border-radius: var(--radius);
      font-family  : var(--sans);
      font-size    : 0.88rem;
      background   : var(--card-bg);
      color        : var(--text-main);
      outline      : none;
      cursor       : pointer;
      min-width    : 160px;
    }

    .toggle-tersedia {
      display     : flex;
      align-items : center;
      gap         : 8px;
      font-size   : 0.85rem;
      color       : var(--text-muted);
      cursor      : pointer;
      user-select : none;
    }

    .toggle-tersedia input { accent-color: var(--green-light); width: 16px; height: 16px; cursor: pointer; }

    /* ── STATS BAR ─────────────────────────────────────────── */
    .stats-bar {
      max-width  : 900px;
      margin     : 14px auto 0;
      padding    : 0 16px;
      display    : flex;
      gap        : 8px;
      flex-wrap  : wrap;
    }

    .stat-chip {
      font-family  : var(--mono);
      font-size    : 0.75rem;
      padding      : 4px 12px;
      border-radius: 20px;
      background   : var(--green-pale);
      color        : var(--green-mid);
      border       : 1px solid var(--green-border);
    }

    .stat-chip span { font-weight: 600; }

    /* ── TABLE ─────────────────────────────────────────────── */
    .table-wrap {
      max-width    : 900px;
      margin       : 18px auto 0;
      padding      : 0 16px;
      overflow-x   : auto;
    }

    table {
      width          : 100%;
      border-collapse: separate;
      border-spacing : 0;
      background     : var(--card-bg);
      border-radius  : var(--radius);
      box-shadow     : var(--shadow);
      overflow       : hidden;
      font-size      : 0.875rem;
    }

    thead {
      background : var(--green-dark);
      color      : var(--white);
    }

    thead th {
      padding      : 13px 14px;
      text-align   : left;
      font-weight  : 600;
      font-size    : 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space  : nowrap;
    }

    tbody tr {
      border-bottom : 1px solid #eef4e8;
      transition    : background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f2faf0; }

    /* Kategori group header */
    tbody tr.kat-header td {
      background   : var(--green-pale);
      color        : var(--green-mid);
      font-weight  : 700;
      font-size    : 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding      : 8px 14px;
      border-bottom: 1px solid var(--green-border);
    }

    td {
      padding    : 11px 14px;
      white-space: nowrap;
    }

    td.nama-col {
      white-space: normal;
      min-width  : 140px;
      font-weight: 500;
    }

    .id-chip {
      font-family  : var(--mono);
      font-size    : 0.72rem;
      color        : var(--text-muted);
      background   : #f0f4ed;
      padding      : 2px 7px;
      border-radius: 5px;
    }

    .harga {
      font-family: var(--mono);
      font-weight: 500;
    }

    .harga-aktif { font-weight: 700; }

    /* Badge naik/turun */
    .badge {
      display      : inline-flex;
      align-items  : center;
      gap          : 3px;
      font-size    : 0.72rem;
      font-family  : var(--mono);
      padding      : 2px 8px;
      border-radius: 20px;
      font-weight  : 600;
    }

    .badge-naik  { background: var(--red-pale);  color: var(--red-text); }
    .badge-turun { background: #e8f5e9;           color: #2e7d32; }
    .badge-sama  { background: #f5f5f5;           color: #757575; }

    .tersedia-yes {
      color      : var(--green-light);
      font-size  : 0.75rem;
      font-weight: 600;
    }

    .tersedia-no {
      color    : #ccc;
      font-size: 0.75rem;
    }

    /* ── EMPTY / LOADING ───────────────────────────────────── */
    .state-box {
      text-align : center;
      padding    : 60px 20px;
      color      : var(--text-muted);
    }

    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-box p     { font-size: 0.9rem; }

    /* ── LOADING SPINNER ───────────────────────────────────── */
    .spinner {
      width        : 36px;
      height       : 36px;
      border       : 3px solid var(--green-border);
      border-top   : 3px solid var(--green-light);
      border-radius: 50%;
      animation    : spin 0.7s linear infinite;
      margin       : 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ─────────────────────────────────────────────── */
    footer {
      text-align : center;
      margin-top : 40px;
      color      : var(--text-muted);
      font-size  : 0.75rem;
      font-family: var(--mono);
    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 18px 16px; }
      .controls, .stats-bar, .table-wrap { padding: 0 10px; }
      td, thead th { padding: 9px 10px; font-size: 0.8rem; }
      .hide-mobile { display: none; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">🌿</div>
        <div class="brand-text">
          <h1>Koperasi Arutala</h1>
          <p>PRICE LIST HARIAN</p>
        </div>
      </div>
      <div id="last-updated">Memuat data…</div>
    </div>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="Cari nama item atau kategori…" autocomplete="off" />
    </div>
    <select id="filter-kat">
      <option value="">Semua Kategori</option>
    </select>
    <label class="toggle-tersedia">
      <input type="checkbox" id="toggle-tersedia" checked />
      Hanya tersedia
    </label>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-chip">Total: <span id="stat-total">—</span></div>
    <div class="stat-chip">Naik: <span id="stat-naik">—</span></div>
    <div class="stat-chip">Turun: <span id="stat-turun">—</span></div>
    <div class="stat-chip">Tidak tersedia: <span id="stat-notavail">—</span></div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="price-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nama Item</th>
          <th>Satuan</th>
          <th class="hide-mobile">Kemarin</th>
          <th>Harga Aktif</th>
          <th>Status</th>
          <th class="hide-mobile">Tersedia</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr>
          <td colspan="7">
            <div class="state-box">
              <div class="spinner"></div>
              <p>Mengambil data dari server…</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>
    <p>Koperasi Arutala &copy; 2026 &mdash; Data diperbarui setiap pagi pukul 06:00 WIB</p>
  </footer>

  <script>
    // ── KONFIGURASI ─────────────────────────────────────────────
    // GANTI dengan URL Web App Apps Script kamu setelah deploy
    const API_URL = "https://script.google.com/macros/s/AKfycbzky4j7P0KQ3-knTcWSxH8yJPVKUpnGHNs3zX7P0kkl67_oaC2SENB1rJ3urR09hfIr/exec";

    // ── STATE ───────────────────────────────────────────────────
    let allData    = [];
    let categories = [];

    // ── INIT ────────────────────────────────────────────────────
    async function init() {
      try {
        const res  = await fetch(API_URL);
        const json = await res.json();

        if (json.status !== "ok") throw new Error(json.message || "Error dari server");

        allData = json.data;

        // Ambil kategori unik, sort A-Z
        categories = [...new Set(allData.map(d => d.kategori))].sort();

        // Populate filter dropdown
        const sel = document.getElementById("filter-kat");
        categories.forEach(kat => {
          const opt = document.createElement("option");
          opt.value = kat;
          opt.textContent = kat;
          sel.appendChild(opt);
        });

        // Format updated time
        const updated = new Date(json.updated);
        document.getElementById("last-updated").textContent =
          `Update: ${updated.toLocaleString("id-ID", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })}`;

        updateStats(allData);
        renderTable(allData);

      } catch (err) {
        document.getElementById("table-body").innerHTML = `
          <tr><td colspan="7">
            <div class="state-box">
              <div class="icon">⚠️</div>
              <p>Gagal memuat data. Periksa koneksi atau URL API.<br><small>${err.message}</small></p>
            </div>
          </td></tr>`;
        document.getElementById("last-updated").textContent = "Gagal memuat";
      }
    }

    // ── FILTER & SEARCH ─────────────────────────────────────────
    function getFiltered() {
      const keyword    = document.getElementById("search").value.toLowerCase().trim();
      const katFilter  = document.getElementById("filter-kat").value;
      const onlyAvail  = document.getElementById("toggle-tersedia").checked;

      return allData.filter(item => {
        const matchKat   = !katFilter || item.kategori === katFilter;
        const matchAvail = !onlyAvail || String(item.tersedia).toLowerCase() !== "tidak";
        const matchKw    = !keyword
          || item.nama.toLowerCase().includes(keyword)
          || item.kategori.toLowerCase().includes(keyword)
          || item.id.toLowerCase().includes(keyword);
        return matchKat && matchAvail && matchKw;
      });
    }

    function applyFilters() {
      const filtered = getFiltered();
      updateStats(filtered);
      renderTable(filtered);
    }

    // ── STATS ────────────────────────────────────────────────────
    function updateStats(data) {
      document.getElementById("stat-total").textContent   = data.length;
      document.getElementById("stat-naik").textContent    = data.filter(d => getStatus(d) === "naik").length;
      document.getElementById("stat-turun").textContent   = data.filter(d => getStatus(d) === "turun").length;
      document.getElementById("stat-notavail").textContent= allData.filter(d => String(d.tersedia).toLowerCase() === "tidak").length;
    }

    // ── RENDER TABLE ─────────────────────────────────────────────
    function renderTable(data) {
      const tbody = document.getElementById("table-body");

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="7">
          <div class="state-box">
            <div class="icon">🔍</div>
            <p>Tidak ada item yang cocok.</p>
          </div></td></tr>`;
        return;
      }

      // Group by kategori
      const grouped = {};
      data.forEach(item => {
        if (!grouped[item.kategori]) grouped[item.kategori] = [];
        grouped[item.kategori].push(item);
      });

      let html = "";
      Object.keys(grouped).sort().forEach(kat => {
        // Kategori header row
        html += `<tr class="kat-header"><td colspan="7">📂 ${kat}</td></tr>`;

        grouped[kat].forEach(item => {
          const st = getStatus(item);
          html += `
            <tr>
              <td><span class="id-chip">${item.id}</span></td>
              <td class="nama-col">${escHtml(item.nama)}</td>
              <td>${escHtml(item.satuan)}</td>
              <td class="harga hide-mobile">${fmtRp(item.hargaKemarin)}</td>
              <td class="harga harga-aktif">${fmtRp(item.hargaAktif)}</td>
              <td>${badgeHtml(st, item)}</td>
              <td class="hide-mobile">${tersediaHtml(item.tersedia)}</td>
            </tr>`;
        });
      });

      tbody.innerHTML = html;
    }

    // ── HELPERS ──────────────────────────────────────────────────
    function getStatus(item) {
      if (!item.hargaKemarin || !item.hargaAktif) return "baru";
      if (item.hargaAktif > item.hargaKemarin)    return "naik";
      if (item.hargaAktif < item.hargaKemarin)    return "turun";
      return "sama";
    }

    function badgeHtml(st, item) {
      const selisih = item.hargaAktif - item.hargaKemarin;
      if (st === "naik")  return `<span class="badge badge-naik">▲ +${fmtRp(selisih)}</span>`;
      if (st === "turun") return `<span class="badge badge-turun">▼ ${fmtRp(selisih)}</span>`;
      if (st === "baru")  return `<span class="badge badge-sama">✦ Baru</span>`;
      return `<span class="badge badge-sama">— Sama</span>`;
    }

    function tersediaHtml(val) {
      return String(val).toLowerCase() === "tidak"
        ? `<span class="tersedia-no">✗ Tidak</span>`
        : `<span class="tersedia-yes">✓ Ya</span>`;
    }

    function fmtRp(val) {
      if (!val || val === 0) return "—";
      return "Rp " + Number(val).toLocaleString("id-ID");
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // ── EVENT LISTENERS ──────────────────────────────────────────
    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("filter-kat").addEventListener("change", applyFilters);
    document.getElementById("toggle-tersedia").addEventListener("change", applyFilters);

    // ── START ────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
